<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lighthouse — 3D · Patryk Wenda</title>
  <meta name="description" content="Interactive 3D lighthouse scene. Model from Spline, rendered with Three.js.">
  <link rel="stylesheet" href="style.css">
    <script type="importmap">
      {
        "imports": {
          "three": "./vendor/three/three.module.js",
          "three/addons/": "./vendor/three/examples/jsm/"
        }
      }
    </script>
</head>
<body>
  <canvas id="canvas"></canvas>

  <div id="loader" class="loader">
    <div class="loader__spinner"></div>
    <span class="loader__label">Loading scene…</span>
  </div>

  <div id="hint" class="hint">
    <span>Drag to orbit · Scroll to zoom · Right-drag to pan</span>
  </div>

  <div id="error" class="error" hidden>
    <p>Couldn't load the 3D scene.</p>
    <small class="error__detail"></small>
    <small>Make sure this page is served over http(s), not opened as a local file.</small>
  </div>

  <div id="lightTool" class="light-tool"></div>
  <div id="leftTools">
    <div id="pixelTool" class="pix-tool"></div>
    <div id="beamTool" class="pix-tool"></div>
    <div id="waterTool" class="pix-tool"></div>
    <div id="glbTool" class="pix-tool"></div>
  </div>
  <div id="camTool" class="pix-tool cam-tool"></div>
  <div id="saveTool" class="save-tool"></div>

  <script type="module" src="main.js"></script>

  <!-- loader fallback — hides loader if module fails to load -->
  <script>setTimeout(function(){var e=document.getElementById('loader');if(e&&!e.classList.contains('is-hidden'))e.classList.add('is-hidden')},15000)</script>
</body>
</html>
